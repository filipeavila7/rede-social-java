<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perfil</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <header>
      <div class="row">
        <strong>Painel Social</strong>
        <div class="row" style="width:auto;">
          <span id="logged-user" class="muted"></span>
          <button id="logout-btn" class="secondary">Sair</button>
        </div>
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar">
        <nav>
          <a href="/feed.html">Feed</a>
          <a href="/profile.html">Perfil</a>
          <a href="/followers.html">Seguidores</a>
          <a href="/chat.html">Chat</a>
          <a href="/users.html">Usuários</a>
        </nav>
      </aside>

      <main class="content grid grid-2">
        <section class="card">
          <h2>Meu Perfil</h2>
          <div id="profile-info" class="muted">Carregando...</div>
          <form id="profile-form" class="grid">
            <div>
              <label>Bio</label>
              <textarea id="profile-bio"></textarea>
            </div>
            <div>
              <label>Foto (URL)</label>
              <input id="profile-img" />
            </div>
            <button type="submit">Salvar</button>
            <div id="profile-msg" class="muted"></div>
          </form>
          <div id="profile-counts" class="muted"></div>
        </section>

        <section class="card">
          <h2>Ver Perfil por Email</h2>
          <form id="search-profile" class="grid">
            <div>
              <label>Email</label>
              <input id="search-email" type="email" />
            </div>
            <button type="submit">Buscar</button>
          </form>
          <div id="search-result" class="muted"></div>
        </section>

        <section class="card" style="grid-column: 1 / -1;">
          <h2>Meus Posts</h2>
          <div id="my-posts" class="list"></div>
        </section>
      </main>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/profile.js"></script>
  </body>
</html>
