<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feed</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <header>
      <div class="row">
        <strong>Painel Social</strong>
        <div class="row" style="width:auto;">
          <span id="logged-user" class="muted"></span>
          <button id="logout-btn" class="secondary">Sair</button>
        </div>
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar">
        <nav>
          <a href="/feed.html">Feed</a>
          <a href="/profile.html">Perfil</a>
          <a href="/followers.html">Seguidores</a>
          <a href="/chat.html">Chat</a>
          <a href="/users.html">Usuários</a>
        </nav>
      </aside>

      <main class="content grid">
        <section class="card">
          <h2>Criar Post</h2>
          <form id="post-form" class="grid">
            <div>
              <label>Conteúdo</label>
              <textarea id="post-content" required></textarea>
            </div>
            <div>
              <label>Imagem do Post</label>
              <input id="post-file" type="file" accept="image/*" />
            </div>
            <button type="submit">Publicar</button>
            <div id="post-msg" class="muted"></div>
          </form>
        </section>

        <section class="card">
          <h2>Posts</h2>
          <div id="posts" class="list"></div>
        </section>
      </main>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/feed.js"></script>
  </body>
</html>
