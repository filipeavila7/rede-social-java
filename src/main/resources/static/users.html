<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Usuários</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <header>
      <div class="row">
        <strong>Painel Social</strong>
        <div class="row" style="width:auto;">
          <span id="logged-user" class="muted"></span>
          <button id="logout-btn" class="secondary">Sair</button>
        </div>
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar">
        <nav>
          <a href="/feed.html">Feed</a>
          <a href="/profile.html">Perfil</a>
          <a href="/followers.html">Seguidores</a>
          <a href="/chat.html">Chat</a>
          <a href="/users.html">Usuários</a>
        </nav>
      </aside>

      <main class="content grid grid-2">
        <section class="card">
          <h2>Criar Usuário</h2>
          <form id="create-user" class="grid">
            <div>
              <label>Nome</label>
              <input id="user-nome" required />
            </div>
            <div>
              <label>Email</label>
              <input id="user-email" type="email" required />
            </div>
            <div>
              <label>Senha</label>
              <input id="user-senha" type="password" required />
            </div>
            <button type="submit">Criar</button>
            <div id="user-msg" class="muted"></div>
          </form>
        </section>

        <section class="card">
          <h2>Editar Usuário</h2>
          <form id="edit-user" class="grid">
            <div>
              <label>ID</label>
              <input id="edit-id" type="number" required />
            </div>
            <div>
              <label>Nome</label>
              <input id="edit-nome" />
            </div>
            <div>
              <label>Email</label>
              <input id="edit-email" type="email" />
            </div>
            <div>
              <label>Senha</label>
              <input id="edit-senha" type="password" />
            </div>
            <button type="submit">Salvar</button>
            <div id="edit-msg" class="muted"></div>
          </form>
        </section>

        <section class="card" style="grid-column: 1 / -1;">
          <h2>Lista de Usuários</h2>
          <div id="users-list" class="list"></div>
        </section>
      </main>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/users.js"></script>
  </body>
</html>
