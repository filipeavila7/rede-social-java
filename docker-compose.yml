version: "3.9"
services:
  db:
    image: mysql:8.0
    container_name: mysql-demo
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: demo_db
      MYSQL_USER: usuario_spring
      MYSQL_PASSWORD: 1234
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
